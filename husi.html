<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Zsömle</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f2e6d9;
    text-align: center;
    background-size: cover;
    background-position: center;
    transition: background-image 1s ease;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
}

#lobbyPet {
    width: 140px;
    position: fixed;
    left: 50%;
    top: 56vh;              /* ezzel lejjebb kerül a szőnyegre */
    transform: translateX(-50%);
    z-index: 5;
}

button {
    margin: 5px;
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #8f7a63;
    cursor: pointer;
}

.bar {
    height: 10px;
    background: white;
    width: 200px;
}

/* 🔥 BAL ALSÓ HUD */
#hunger, #happy, #energy {
    margin: 3px 0;
}

#hunger::before,
#happy::before,
#energy::before {
    display: block;
    margin-bottom: 2px;
}

/* konténer hack */
#hunger, #happy, #energy {
    position: relative;
}

body > p, 
body > .bar {
    text-align: left;
}

body > p:nth-of-type(1),
#hunger,
body > p:nth-of-type(2),
#happy,
body > p:nth-of-type(3),
#energy {
    position: fixed;
    left: 20px;
}

/* konkrét pozik */
body > p:nth-of-type(1) { bottom: 110px; }
#hunger { bottom: 145px; }

body > p:nth-of-type(2) { bottom: 70px; }
#happy { bottom: 105px; }

body > p:nth-of-type(3) { bottom: 30px; }
#energy { bottom: 65px; }

/* GAME */
#gameOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: black;
}

#game {
    width: 100vw;
    height: 100vh;
    display: block;
}

/* GAME OVER */
#gameOverScreen {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    color: white;
    text-align: center;
    padding-top: 120px;
}

#gameOverScreen img {
    width: 120px;
    margin: 20px;
}

#gameOverScreen button {
    display: block;
    margin: 10px auto;
    width: 150px;
}

/* LOAD SCREEN */
#loadScreen {
    position: fixed;
    inset: 0;
    z-index: 99999;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
    cursor: pointer;
    transition: opacity 1.5s ease;
}

#loadScreen img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.5;
}

#loadTitle {
    font-size: 40px;
    font-weight: bold;
    z-index: 2;
}

#loadSub {
    font-size: 18px;
    margin-top: 5px;
    z-index: 2;
}

#pressStart {
    margin-top: 20px;
    font-size: 20px;
    animation: pulse 1s infinite;
    z-index: 2;
}

@keyframes pulse {
    0% { opacity: 0.3; }
    50% { opacity: 1; }
    100% { opacity: 0.3; }
}

/* LOADING BAR */
#barWrap {
    width: 250px;
    height: 10px;
    border: 2px solid white;
    margin-top: 20px;
    display: none;
    z-index: 2;
}

#barFill {
    height: 100%;
    width: 0%;
    background: white;
    transition: width 3s linear;
}

/* LOADING TEXT */
#loadingText {
    margin-top: 10px;
    font-size: 16px;
    display: none;
    z-index: 2;
}

/* FADE */
#fade {
    position: fixed;
    inset: 0;
    background: black;
    opacity: 1;
    z-index: 100000;
    pointer-events: none;
    transition: opacity 0.5s ease;
}

#storeArrow {
    position: fixed;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 30;
    font-size: 28px;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.9);
}

#storeScreen {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 40;
    background: rgba(35, 24, 15, 0.92);
    color: white;
    overflow-y: auto;
}

#storeContent {
    max-width: 820px;
    margin: 32px auto;
    background: rgba(255, 255, 255, 0.12);
    border: 2px solid #d8b48a;
    border-radius: 14px;
    padding: 18px;
}

#storeTop {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}

#storeCoinDisplay {
    font-weight: bold;
}

.storeGrid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
}

.storeCard {
    background: rgba(0, 0, 0, 0.22);
    border: 1px solid #dbbb95;
    border-radius: 10px;
    padding: 10px;
    text-align: left;
}

.storeCard h4 {
    margin: 0 0 8px;
}

.storeCard p {
    margin: 0 0 10px;
}

#storeMessage {
    min-height: 22px;
    margin-top: 12px;
    color: #ffe2c1;
}
</style>
</head>

<body>

<!-- LOAD SCREEN -->
<div id="loadScreen" onclick="startGame()">
    <img src="loadscreen.jpeg">

    <div id="loadTitle">HUSI AND FRIENDS</div>
    <div id="loadSub">THE GAME</div>

    <div id="pressStart">PRESS TO START</div>

    <div id="barWrap">
        <div id="barFill"></div>
    </div>

    <div id="loadingText">LOADING</div>
</div>

<!-- FADE -->
<div id="fade"></div>

<div> <h1>Zsömle 🐶</h1>

<img id="lobbyPet" src="karakter.png">
</div>
<p>Éhség</p>
<div id="hunger" class="bar"></div>

<p>Boldogság</p>
<div id="happy" class="bar"></div>

<p>Energia</p>
<div id="energy" class="bar"></div>

<br>

<button onclick="openGame()">Mini játék</button>
<button id="storeArrow" onclick="openStore()" title="Store">⬅</button>

<div id="storeScreen">
    <div id="storeContent">
        <div id="storeTop">
            <h2>🛒 Store</h2>
            <div>
                <span id="storeCoinDisplay">💰 Coin: 0</span>
                <button onclick="closeStore()">Vissza a lobbyba</button>
            </div>
        </div>

        <h3>Fogyóeszközök</h3>
        <div class="storeGrid">
            <div class="storeCard">
                <h4>🍖 Kaja</h4>
                <p>+20 éhség</p>
                <button onclick="buyStoreItem('food')">80 coin</button>
            </div>
            <div class="storeCard">
                <h4>🎾 Játék</h4>
                <p>+20 boldogság</p>
                <button onclick="buyStoreItem('toy')">100 coin</button>
            </div>
            <div class="storeCard">
                <h4>⚡ Energy ital</h4>
                <p>+20 energia</p>
                <button onclick="buyStoreItem('energy')">90 coin</button>
            </div>
        </div>

        <h3>Skinek</h3>
        <div class="storeGrid">
            <div class="storeCard">
                <h4>🐶 Alap skin</h4>
                <p>Ingyenes</p>
                <button onclick="buyStoreItem('defaultSkin')">Használom</button>
            </div>
            <div class="storeCard">
                <h4>😎 Cool skin</h4>
                <p>150 coin</p>
                <button onclick="buyStoreItem('coolSkin')">Megveszem / használom</button>
            </div>
            <div class="storeCard">
                <h4>🔥 Legend skin</h4>
                <p>250 coin</p>
                <button onclick="buyStoreItem('legendSkin')">Megveszem / használom</button>
            </div>
        </div>

        <div id="storeMessage"></div>
    </div>
</div>

<div id="gameOverlay">
    <canvas id="game"></canvas>
</div>

<!-- GAME OVER -->
<div id="gameOverScreen">
    <h1>GAME OVER</h1>
    <h2>husi leesett</h2>

    <img src="szomoru.png">

    <button onclick="restartGame()">Restart</button>
    <button onclick="backToMenu()">Menü</button>
    <button onclick="quitGame()">Quit</button>
</div>

<script>

/* 🌙 DAY/NIGHT BACKGROUND */

function updateLobbyBackground() {
    let hour = new Date().getHours();

    if (hour >= 6 && hour < 18) {
        document.body.style.backgroundImage = "url('lobbyday.jpeg')";
    } else {
        document.body.style.backgroundImage = "url('lobbynight.jpeg')";
    }
}

updateLobbyBackground();
setInterval(updateLobbyBackground, 1000 * 60 * 60 * 3);

/* FADE IN */
window.addEventListener("load", () => {
    const fade = document.getElementById("fade");

    setTimeout(() => {
        fade.style.opacity = "0";
    }, 50);

    setTimeout(() => {
        fade.style.display = "none";
    }, 500);
});

/* LOAD SCREEN */

let started = false;
let loadingInterval;

function startGame() {
    if (started) return;
    started = true;

    document.getElementById("pressStart").style.display = "none";
    document.getElementById("barWrap").style.display = "block";
    document.getElementById("loadingText").style.display = "block";

    setTimeout(() => {
        document.getElementById("barFill").style.width = "100%";
    }, 50);

    let dots = 0;
    loadingInterval = setInterval(() => {
        dots = (dots + 1) % 4;
        document.getElementById("loadingText").innerText =
            "LOADING" + ".".repeat(dots);
    }, 400);

    setTimeout(() => {

        clearInterval(loadingInterval);

        let ls = document.getElementById("loadScreen");
        ls.style.opacity = "0";

        setTimeout(() => {
            ls.style.display = "none";
        }, 1500);

    }, 3000);
}

/* UI */

let hunger = 100;
let happy = 100;
let energy = 100;
let coins = 0;

const STORE_ITEMS = {
    food: { name: "🍖 Kaja", cost: 80, stat: "hunger", amount: 20 },
    toy: { name: "🎾 Játék", cost: 100, stat: "happy", amount: 20 },
    energy: { name: "⚡ Pihi ital", cost: 90, stat: "energy", amount: 20 },
    defaultSkin: { name: "🐶 Alap skin", type: "skin", cost: 0, skin: "default" },
    coolSkin: { name: "😎 Cool skin", type: "skin", cost: 150, skin: "cool" },
    legendSkin: { name: "🔥 Legend skin", type: "skin", cost: 250, skin: "legend" }
};

const ownedSkins = new Set(["default"]);
let currentSkin = "default";
let currentRenderFilter = "none";

function updateBars() {
    document.getElementById("hunger").style.width = hunger + "px";
    document.getElementById("happy").style.width = happy + "px";
    document.getElementById("energy").style.width = energy + "px";
}

function updateCoinsUI() {
    document.getElementById("storeCoinDisplay").innerText = `💰 Coin: ${coins}`;
}

function clampStats() {
    hunger = Math.max(0, Math.min(200, hunger));
    happy = Math.max(0, Math.min(200, happy));
    energy = Math.max(0, Math.min(200, energy));
}

function showStoreMessage(text) {
    document.getElementById("storeMessage").innerText = text;
}

function openStore() {
    document.getElementById("storeScreen").style.display = "block";
}

function closeStore() {
    document.getElementById("storeScreen").style.display = "none";
}

function applySkin(skinKey) {
    const lobbyPet = document.getElementById("lobbyPet");
    if (skinKey === "default") {
        lobbyPet.style.filter = "none";
        currentRenderFilter = "none";
    }
    if (skinKey === "cool") {
        lobbyPet.style.filter = "hue-rotate(120deg) saturate(1.4)";
        currentRenderFilter = "hue-rotate(120deg) saturate(1.4)";
    }
    if (skinKey === "legend") {
        lobbyPet.style.filter = "hue-rotate(280deg) saturate(1.8) brightness(1.1)";
        currentRenderFilter = "hue-rotate(280deg) saturate(1.8) brightness(1.1)";
    }
}

function buyStoreItem(itemKey) {
    const item = STORE_ITEMS[itemKey];
    if (!item) return;

    if (item.type === "skin") {
        if (!ownedSkins.has(item.skin)) {
            if (coins < item.cost) {
                showStoreMessage("Nincs elég coinod ehhez.");
                return;
            }
            coins -= item.cost;
            ownedSkins.add(item.skin);
        }
        currentSkin = item.skin;
        applySkin(currentSkin);
        updateCoinsUI();
        showStoreMessage(`${item.name} aktiválva.`);
        return;
    }

    if (coins < item.cost) {
        showStoreMessage("Nincs elég coinod ehhez.");
        return;
    }

    coins -= item.cost;

    if (item.stat === "hunger") hunger += item.amount;
    if (item.stat === "happy") happy += item.amount;
    if (item.stat === "energy") energy += item.amount;

    clampStats();
    updateBars();
    updateCoinsUI();
    showStoreMessage(`${item.name} megvéve!`);
}

/* A lobby #lobbyPet statikus dekoráció, a mozgás csak a canvas játékoson történik. */

let bgImage = new Image();
bgImage.src = "ezkellneked.jpg";

let charImg = new Image();
charImg.src = "karakter.png";

let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let gameRunning = false;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);

let player = { x: 200, y: 200, vy: 0, size: 50 };

let gravity = 0.35;
let jumpPower = -12;

let platforms = [];
let highestY = 0;
let runMaxHeight = 0;

function createPlatforms() {
    platforms = [];

    let startY = canvas.height - 80;

    platforms.push({
        x: canvas.width / 2 - 60,
        y: startY,
        w: 120
    });

    for (let i = 0; i < 10; i++) {
        platforms.push({
            x: 50 + Math.random() * (canvas.width - 150),
            y: startY - i * 90,
            w: 110
        });
    }
}

function setLobbyPetVisible(isVisible) {
    const lobbyPet = document.getElementById("lobbyPet");
    lobbyPet.style.display = isVisible ? "block" : "none";
}

function openGame() {
    document.getElementById("gameOverlay").style.display = "block";
    document.getElementById("gameOverScreen").style.display = "none";
    setLobbyPetVisible(false);

    resize();

    gameRunning = true;

    player = {
        x: canvas.width / 2,
        y: canvas.height - 320,
        vy: 0,
        size: 50
    };

    highestY = player.y;
    runMaxHeight = 0;

    createPlatforms();

    updateGame();
}

function gameOver() {
    gameRunning = false;
    const earned = Math.max(10, Math.floor(runMaxHeight / 60));
    coins += earned;
    updateCoinsUI();
    showStoreMessage(`+${earned} coin a mini játékból!`);
    document.getElementById("gameOverScreen").style.display = "block";
}

function restartGame() {
    openGame();
}

function backToMenu() {
    document.getElementById("gameOverlay").style.display = "none";
    document.getElementById("gameOverScreen").style.display = "none";
    gameRunning = false;
    setLobbyPetVisible(true);
}

function quitGame() {
    document.getElementById("gameOverlay").style.display = "none";
    document.getElementById("gameOverScreen").style.display = "none";
    gameRunning = false;
    setLobbyPetVisible(true);
}

document.addEventListener("keydown", (e) => {
    if (!gameRunning) return;

    if (e.key === "ArrowLeft") player.x -= 18;
    if (e.key === "ArrowRight") player.x += 18;
});

function drawBackground() {
    if (bgImage.complete) {
        ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
    }
}

function updateGame() {
    if (!gameRunning) return;

    drawBackground();

    player.vy += gravity;
    player.y += player.vy;

    if (player.y < canvas.height * 0.3) {
        let diff = canvas.height * 0.3 - player.y;
        player.y = canvas.height * 0.3;

        for (let p of platforms) {
            p.y += diff;
        }

        highestY += diff;
        runMaxHeight += diff;
    }

    for (let p of platforms) {
        ctx.fillStyle = "#8B5A2B";
        ctx.fillRect(p.x, p.y, p.w, 12);

        if (
            player.vy > 0 &&
            player.x + player.size > p.x &&
            player.x < p.x + p.w &&
            player.y + player.size >= p.y &&
            player.y + player.size <= p.y + 15
        ) {
            player.y = p.y - player.size;
            player.vy = jumpPower;
        }
    }

    if (player.y > canvas.height) {
        gameOver();
    }

    ctx.filter = currentRenderFilter;
    ctx.drawImage(charImg, player.x, player.y, player.size, player.size);
    ctx.filter = "none";

    requestAnimationFrame(updateGame);
}

updateBars();
updateCoinsUI();
applySkin(currentSkin);

</script>

</body>
</html>
